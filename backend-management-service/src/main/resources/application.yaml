spring:
  application:
    name: management-service

  datasource:
    url: jdbc:h2:file:./data/synaxis;DB_CLOSE_DELAY=-1;AUTO_SERVER=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8080
